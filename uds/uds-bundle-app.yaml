# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/uds-cli/refs/heads/main/uds.schema.json
#
# App-only bundle for clusters that already run UDS Core. Built by
# service/scripts/build_uds_package.sh via uds/bundle-app/ (uds create reads
# uds-bundle.yaml from that directory).
kind: UDSBundle
metadata:
  name: tacvoice-app
  description: "TacVoice app package for existing UDS Core clusters"
  version: "0.1.0"
  architecture: amd64

packages:
  - name: tacvoice
    path: ..
    ref: 0.1.0-uds.0
